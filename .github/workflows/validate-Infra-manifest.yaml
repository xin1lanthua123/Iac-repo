name: validate workflow
on:
  workflow_dispatch:
      inputs:
        env:
            description: "env"
            required: true
            default: "dev"
            type: choice
            options:
            - dev
            - prod
        action:
            description: "Terraform action"
            required: true
            default: "apply"
            type: choice
            options:
              - apply
              - destroy
        

  # pull_request:
  #   branches:
  #     - main
  # push:
  #   branches:
  #       - main
  #       - ci/feature/*
  #   paths:
  #       - infra/**
  #       - terragrunt/**
  #   tags:
  #     - "[0-9]*.[0-9]*.[0-9]*"
concurrency:
  group: gitops-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true
jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:

      terraform_bootstrap_changed: ${{ steps.extract.outputs.terraform_bootstrap_changed }}
      terraform_modules_changed: ${{ steps.extract.outputs.terraform_modules_changed }}
      terraform_modules: ${{ steps.extract.outputs.terraform_modules }}

      terragrunt_bootstrap_changed: ${{ steps.extract.outputs.terragrunt_bootstrap_changed }}
      terragrunt_modules_changed: ${{ steps.extract.outputs.terragrunt_modules_changed }}
      terragrunt_modules: ${{ steps.extract.outputs.terragrunt_modules }}
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Paths Filter
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d #vv4.0.1
        with:
          list-files: shell
          filters: |
            terraform-bootstrap:
              - 'infra/bootstrap/**'
            terraform-modules:
              - 'infra/modules/**'
            terragrunt-bootstrap:
              - 'terragrunt/bootstrap/**'
            terragrunt-modules:
              - 'terragrunt/us-east-1/**'

      - name: Extract service list from changed files
        id: extract
        run: |
            set -euo pipefail

            # TERRAFORM BOOTSTRAP

            TF_BOOTSTRAP="${{ steps.filter.outputs.terraform-bootstrap_files }}"

            if [ -n "$TF_BOOTSTRAP" ]; then
              BOOT=$(echo "$TF_BOOTSTRAP" \
                | tr ' ' '\n' \
                | cut -d '/' -f2 \
                | sort -u \
                | jq -R -s -c 'split("\n") | map(select(length>0))')

              echo "terraform_bootstrap_changed=true" >> $GITHUB_OUTPUT
              echo "terraform_bootstrap=$BOOT" >> $GITHUB_OUTPUT
            else
              echo "terraform_bootstrap_changed=false" >> $GITHUB_OUTPUT
              echo "terraform_bootstrap=[]" >> $GITHUB_OUTPUT
            fi

             #TERRAFORM MODULES

            TF_MODULES_FILES="${{ steps.filter.outputs.terraform-modules_files }}"
            if [ -n "$TF_MODULES_FILES" ]; then
              TF_MODULES=$(echo "$TF_MODULES_FILES" \
                | tr ' ' '\n' \
                | cut -d'/' -f3 \
                | sort -u \
                | jq -R -s -c 'split("\n") | map(select(length>0))')

              echo "terraform_modules_changed=true" >> $GITHUB_OUTPUT
              echo "terraform_modules=$TF_MODULES" >> $GITHUB_OUTPUT
            else
              echo "terraform_modules_changed=false" >> $GITHUB_OUTPUT
              echo "terraform_modules=[]" >> $GITHUB_OUTPUT
            fi
            
            # TERRAGRUNT BOOTSTRAP

            TG_BOOT_FILES="${{ steps.filter.outputs.terragrunt-bootstrap_files }}"

            if [ -n "$TG_BOOT_FILES" ]; then
              TG_BOOT=$(echo "$TG_BOOT_FILES" \
                | tr ' ' '\n' \
                | cut -d'/' -f2 \
                | sort -u \
                | jq -R -s -c 'split("\n") | map(select(length>0))')

              echo "terragrunt_bootstrap_changed=true" >> $GITHUB_OUTPUT
              echo "terragrunt_bootstrap=$TG_BOOT" >> $GITHUB_OUTPUT
            else
              echo "terragrunt_bootstrap_changed=false" >> $GITHUB_OUTPUT
              echo "terragrunt_bootstrap=[]" >> $GITHUB_OUTPUT
            fi

            
            # TERRAGRUNT MODULES
           
            TG_FILES="${{ steps.filter.outputs.terragrunt-modules_files }}"

            if [ -n "$TG_FILES" ]; then
              TG=$(echo "$TG_FILES" \
                | tr ' ' '\n' \
                | cut -d'/' -f4 \
                | sort -u \
                | jq -R -s -c 'split("\n") | map(select(length>0))')

              echo "terragrunt_modules_changed=true" >> $GITHUB_OUTPUT
              echo "terragrunt_modules=$TG" >> $GITHUB_OUTPUT
            else
              echo "terragrunt_modules_changed=false" >> $GITHUB_OUTPUT
              echo "terragrunt_modules=[]" >> $GITHUB_OUTPUT
            fi

  terraform-scan:
    name: " Terraform Security Scan"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
     needs.detect-changes.outputs.terraform_modules_changed == 'true' ||
     needs.detect-changes.outputs.terraform_bootstrap_changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        modules : ${{ fromJson(needs.detect-changes.outputs.terraform_modules) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3


      - name: Check Terraform manifest logic
        if: needs.detect-changes.outputs.terraform_modules_changed == 'true'
        working-directory: infra/module/${{ matrix.modules }}
        run: |
          terraform validate

      - name: Check Terraform manifest logic
        if: needs.detect-changes.outputs.terraform_bootstrap_changed == 'true'
        working-directory: infra/bootstrap
        run: |
          terraform validate

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/
          framework: terraform
          soft_fail: false
          skip_check: CKV_AWS_39,CKV_AWS_58  # Public EKS endpoint (intentional for dev)
          output_format: cli

  terragrunt-scan:
    name: " Terragrunt logic Scan"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.terragrunt_modules_changed == 'true' ||
      needs.detect-changes.outputs.terragrunt_bootstrap_changed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Terragrunt and OpenTofu
        uses: gruntwork-io/terragrunt-action@v3
        with:
              tg_version: '0.82.2'
              tofu_version: '1.10.1'

      - name: Check Terragrunt manifest logic
        working-directory: terragrunt 
        run: |
          terragrunt run-all validate

  call-terraform-for-dev:
        if: |
         github.ref == 'refs/heads/dev' && 
         github.event_name == 'push' &&  
         needs.detect-changes.outputs.terragrunt_modules_changed == 'true'
        needs:
          - terragrunt-scan
          - terraform-scan
          - detect-changes
        uses: ./.github/workflows/workflow-call.yaml
        with: 
            env : ${{ inputs.env }} 
            action: ${{ inputs.action }}
            aws_region: ${{ vars.AWS_REGION }}
        secrets: inherit
        
  call-terraform-for-prod:
        if: |
         github.ref == 'refs/heads/main'&& 
         github.event_name == 'push' &&  
         needs.detect-changes.outputs.terragrunt_modules_changed == 'true'
        needs:
          - terragrunt-scan
          - terraform-scan
          - detect-changes
        uses: ./.github/workflows/workflow-call.yaml
        with: 
            env : ${{ inputs.env }} 
            action: ${{ inputs.action }}
            aws_region: ${{ vars.AWS_REGION }}
        secrets: inherit