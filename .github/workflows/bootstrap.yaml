name: Bootstrapp

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform bootstrap action"
        required: true
        type: choice
        options:
          - apply
          - destroy

concurrency:
  group: terraform-bootstrap
  cancel-in-progress: false

jobs:

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      terraform_bootstrap_changed: ${{ steps.extract.outputs.terraform_bootstrap_changed }}
      terragrunt_bootstrap_changed: ${{ steps.extract.outputs.terragrunt_bootstrap_changed }}
      workflow_changed: ${{ steps.extract.outputs.workflow_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Paths Filter
        id: filter
        uses: dorny/paths-filter@v4
        with:
          list-files: shell
          filters: |
            terraform-bootstrap:
              - 'infra/bootstrap/**'
            terragrunt-bootstrap:
              - 'terragrunt/bootstrap/**'
            workflow:
              - '.github/workflows/bootstrap.yaml'

      - name: Extract changed paths
        id: extract
        run: |
          set -euo pipefail

          TF_BOOTSTRAP="${{ steps.filter.outputs.terraform-bootstrap }}"
          TG_BOOTSTRAP="${{ steps.filter.outputs.terragrunt-bootstrap }}"
          WORKFLOW="${{ steps.filter.outputs.workflow }}"

          if [ "$TF_BOOTSTRAP" = "true" ]; then
            echo "terraform_bootstrap_changed=true" >> $GITHUB_OUTPUT
          else
            echo "terraform_bootstrap_changed=false" >> $GITHUB_OUTPUT
          fi

          if [ "$TG_BOOTSTRAP" = "true" ]; then
            echo "terragrunt_bootstrap_changed=true" >> $GITHUB_OUTPUT
          else
            echo "terragrunt_bootstrap_changed=false" >> $GITHUB_OUTPUT
          fi

          if [ "$WORKFLOW" = "true" ]; then
            echo "workflow_changed=true" >> $GITHUB_OUTPUT
          else
            echo "workflow_changed=false" >> $GITHUB_OUTPUT
          fi

  terraform-scan:
    name: Terraform Security Scan
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.terraform_bootstrap_changed == 'true' ||
      needs.detect-changes.outputs.workflow_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform validate
        working-directory: infra/bootstrap  
        run: |
          terraform init
          terraform validate

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/bootstrap
          framework: terraform
          soft_fail: true

  terragrunt-scan:
    name: Terragrunt Logic Scan
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.terraform_bootstrap_changed == 'true' ||
      needs.detect-changes.outputs.workflow_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Terragrunt
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: '0.82.2'
          tofu_version: '1.10.1'

      - name: Terragrunt validate
        working-directory: terragrunt/bootstrap/local
        run: | 
          terragrunt run-all validate

  terraform-bootstrap:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - terraform-scan
      - terragrunt-scan

    if: |
      needs.detect-changes.outputs.terraform_bootstrap_changed == 'true' ||
      needs.detect-changes.outputs.workflow_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Terragrunt
        uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: '0.82.2'
          tofu_version: '1.10.1'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Plan Bootstrap
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: terragrunt/bootstrap/local
        run: |
          set -euo pipefail
          terragrunt plan --terragrunt-non-interactive

      - name: Apply Bootstrap
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: terragrunt/bootstrap/local
        run: |
          set -euo pipefail
          terragrunt apply --auto-approve --terragrunt-non-interactive

      - name: Setup remote state migration
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: terragrunt/bootstrap/local
        run: |
          chmod +x remote_state.sh
          ./remote_state.sh

      - name: Migrate state to S3
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: terragrunt/bootstrap/local
        run: |
          terragrunt init -migrate-state -force-copy -terragrunt-non-interactive

      - name: Recreate backend config
        if: ${{ github.event.inputs.action == 'destroy' }}
        working-directory: terragrunt/bootstrap/local
        run: |
          chmod +x remote_state.sh
          ./remote_state.sh

      - name: Init remote backend
        if: ${{ github.event.inputs.action == 'destroy' }}
        working-directory: terragrunt/bootstrap/local
        run: |
          terragrunt init --terragrunt-non-interactive

      - name: Destroy Bootstrap
        if: ${{ github.event.inputs.action == 'destroy' }}
        working-directory: terragrunt/bootstrap/local
        run: |
          set -euo pipefail
          terragrunt destroy --auto-approve --terragrunt-non-interactive