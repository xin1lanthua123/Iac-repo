name: Bootstrap
on: 
 workflow_dispatch:
      inputs:
        action:
            description: "Terraform bootstrap execution"
            required: true
            type: choice
            options:
            - execute bootstrap
            - destroy
concurrency:
  group: terraform-bootstrap
  cancel-in-progress: false
jobs:
    detect-changes:
      name: Detect Changed Services
      runs-on: ubuntu-latest
      outputs:

        terraform_bootstrap_changed: ${{ steps.extract.outputs.terraform_bootstrap_changed }}
        terragrunt_bootstrap_changed: ${{ steps.extract.outputs.terragrunt_bootstrap_changed }}
        
      steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Paths Filter
          id: filter
          uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d #vv4.0.1
          with:
            list-files: shell
            filters: |
              terraform-bootstrap:
                - 'infra/bootstrap/**'
              terragrunt-bootstrap:
                - 'terragrunt/bootstrap/**'

        - name: Extract service list from changed files
          id: extract
          run: |
              set -euo pipefail

              # TERRAFORM BOOTSTRAP

              TF_BOOTSTRAP="${{ steps.filter.outputs.terraform-bootstrap_files }}"

              if [ -n "$TF_BOOTSTRAP" ]; then
                BOOT=$(echo "$TF_BOOTSTRAP" \
                  | tr ' ' '\n' \
                  | cut -d '/' -f2 \
                  | sort -u \
                  | jq -R -s -c 'split("\n") | map(select(length>0))')

                echo "terraform_bootstrap_changed=true" >> $GITHUB_OUTPUT
                echo "terraform_bootstrap=$BOOT" >> $GITHUB_OUTPUT
              else
                echo "terraform_bootstrap_changed=false" >> $GITHUB_OUTPUT
                echo "terraform_bootstrap=[]" >> $GITHUB_OUTPUT
              fi

              # TERRAGRUNT BOOTSTRAP

              TG_BOOT_FILES="${{ steps.filter.outputs.terragrunt-bootstrap_files }}"

              if [ -n "$TG_BOOT_FILES" ]; then
                TG_BOOT=$(echo "$TG_BOOT_FILES" \
                  | tr ' ' '\n' \
                  | cut -d'/' -f2 \
                  | sort -u \
                  | jq -R -s -c 'split("\n") | map(select(length>0))')

                echo "terragrunt_bootstrap_changed=true" >> $GITHUB_OUTPUT
                echo "terragrunt_bootstrap=$TG_BOOT" >> $GITHUB_OUTPUT
              else
                echo "terragrunt_bootstrap_changed=false" >> $GITHUB_OUTPUT
                echo "terragrunt_bootstrap=[]" >> $GITHUB_OUTPUT
              fi

    terraform-scan:
      name: " Terraform Security Scan"
      runs-on: ubuntu-latest
      needs: detect-changes
      if: |
        needs.detect-changes.outputs.terraform_bootstrap_changed == 'true'
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3


        - name: Check Terraform manifest logic
          working-directory: infra/bootstrap
          run: |
            terraform validate

        - name: Check Terraform manifest logic
          working-directory: infra/bootstrap
          run: |
            terraform validate

        - name: Run Checkov on Terraform
          uses: bridgecrewio/checkov-action@v12
          with:
            directory: infra/bootstrap
            framework: terraform
            soft_fail: false
            skip_check: CKV_AWS_39,CKV_AWS_58  # Public EKS endpoint (intentional for dev)
            output_format: cli

    terragrunt-scan:
      name: " Terragrunt logic Scan"
      runs-on: ubuntu-latest
      needs: detect-changes
      if: |
        needs.detect-changes.outputs.terragrunt_bootstrap_changed == 'true'
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Install Terragrunt and OpenTofu
          uses: gruntwork-io/terragrunt-action@v3
          with:
                tg_version: '0.82.2'
                tofu_version: '1.10.1'

        - name: Check Terragrunt manifest logic
          working-directory: terragrunt 
          run: |
            terragrunt run-all validate

    terraform-bootstrap:
        runs-on: ubuntu-latest
        needs:
          - terragrunt-scan
          - terraform-scan
          - detect-changes
        if: |
          needs.detect-changes.outputs.terragrunt_bootstrap_changed == 'true'
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Install Terragrunt and OpenTofu
              uses: gruntwork-io/terragrunt-action@v3
              with:
                    tg_version: '0.82.2'
                    tofu_version: '1.10.1'

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ vars.AWS_REGION }}

            - name: Plan terraform bootstrap using terragrunt
              working-directory: terragrunt/bootstrap/local
              shell: bash
              run: |
                set -euo pipefail
                terragrunt plan --terragrunt-non-interactive

            - name: Apply terraform bootstrap using terragrunt
              working-directory: terragrunt/bootstrap/local
              shell: bash
              run: |
                set -euo pipefail
                terragrunt apply --auto-approve --terragrunt-non-interactive
                

            - name: set up config for state migration
              working-directory: terragrunt/bootstrap/local
              shell: bash
              run: |
                chmod +x remote_state.sh 
                ./remote_state.sh

            - name: Migrate local state to remote state S3
              working-directory: terragrunt/bootstrap/local
              shell: bash
              run: |
                terragrunt init -migrate-state -force-copy -terragrunt-non-interactive 
            
            - name: Destroy Bootstrap
              if: ${{ github.event.inputs.action == 'destroy' }}
              working-directory: terragrunt/bootstrap/local
              run: |
                set -euo pipefail
                terragrunt destroy --auto-approve --terragrunt-non-interactive
                